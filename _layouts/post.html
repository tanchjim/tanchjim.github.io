---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <time class="post-date">{{ page.date | date: "%Y-%m-%d %H:%M" }}</time>
        {% if page.categories %}
        <div class="post-categories">
            {% for cat in page.categories %}
            <span class="category">{{ cat }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </header>
    
    <div class="post-content">
        {{ content }}
    </div>
    
    <footer class="post-footer">
        <a href="{{ '/' | relative_url }}" class="btn btn-primary">← 返回首页</a>
    </footer>
</article>
